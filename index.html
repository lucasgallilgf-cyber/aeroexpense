<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AeroExpense">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D1F3C">
<title>AeroExpense</title>
<style>
:root{--navy:#0D1F3C;--amber:#F5A623;--bg:#EEF2F9;--surface:#fff;--text:#0D1F3C;--muted:#5A7090;--border:#D4DCE9;--radius:14px;--green:#2E7D32;--green-bg:#E8F5E9;--orange-bg:#FFF8E8;--orange:#8A6200;--red:#C0392B}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;color:var(--text)}
#root{min-height:100%;display:flex;flex-direction:column}
/* setup / identity */
.setup-screen,.identity-screen{min-height:100vh;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center}
.setup-screen h1,.identity-screen h1{color:#fff;font-size:26px;font-weight:700;margin-bottom:6px}
.big-icon{font-size:60px;margin-bottom:14px}
.sub-txt{color:rgba(255,255,255,.55);font-size:14px;line-height:1.55;margin-bottom:22px}
.setup-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:18px;margin-bottom:18px;text-align:left;width:100%;max-width:360px}
.setup-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.setup-step:last-child{margin-bottom:0}
.step-num{background:var(--amber);color:var(--navy);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.step-txt{color:rgba(255,255,255,.8);font-size:13px;line-height:1.5}
.step-url{color:var(--amber);font-weight:600}
.wide-input{width:100%;max-width:360px;padding:14px 16px;border:2px solid rgba(255,255,255,.2);border-radius:var(--radius);background:rgba(255,255,255,.1);color:#fff;font-size:16px;outline:none;margin-bottom:10px;text-align:center;font-family:inherit;-webkit-appearance:none}
.wide-input::placeholder{color:rgba(255,255,255,.35)}
.wide-input:focus{border-color:var(--amber)}
.btn-amber{width:100%;max-width:360px;background:var(--amber);color:var(--navy);border:none;border-radius:var(--radius);padding:15px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-amber:active{transform:scale(.98)}
.setup-note{color:rgba(255,255,255,.3);font-size:12px;margin-top:14px;line-height:1.6}
/* identity cards */
.id-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px;margin-bottom:14px}
.id-card{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:var(--radius);padding:14px 8px;text-align:center;cursor:pointer;transition:all .15s}
.id-card:active{transform:scale(.97)}
.id-card.pilot{border-color:rgba(66,133,244,.7)}
.id-card.socio{border-color:rgba(52,168,83,.7)}
.id-card.admin-card{border-color:var(--amber);background:rgba(245,166,35,.1)}
.id-ico{font-size:26px;margin-bottom:6px}
.id-name{font-size:13px;font-weight:600;color:#fff}
.id-role{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.id-full-card{display:flex;align-items:center;gap:12px;padding:14px 16px;width:100%;max-width:360px;background:rgba(255,255,255,.1);border:1.5px solid var(--amber);border-radius:var(--radius);cursor:pointer;margin-top:4px}
.id-full-card:active{transform:scale(.98)}
.role-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.role-admin{background:#FFF3CD;color:#856404}
.role-pilot{background:#E0EAFF;color:#1A4DAA}
.role-socio{background:#E8F5E9;color:#2E7D32}
/* app shell */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--navy);color:#fff;padding:12px 18px 10px;position:sticky;top:0;z-index:50;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.topbar-title{font-size:16px;font-weight:700}
.topbar-right{font-size:11px;color:rgba(255,255,255,.5);text-align:right}
.content{flex:1;padding:14px 14px 92px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);z-index:50;padding-bottom:env(safe-area-inset-bottom,0)}
.navbtn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px 6px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:9px;gap:2px;font-family:inherit;min-height:54px}
.navbtn .ni{font-size:19px;line-height:1}
.navbtn.on{color:var(--navy);font-weight:600}
/* type toggle */
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 3px rgba(13,31,60,.07)}
.type-btn{padding:11px 6px;border:none;background:transparent;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);font-family:inherit;transition:all .15s;white-space:nowrap}
.type-btn.on{background:var(--navy);color:#fff}
/* cards */
.card{background:var(--surface);border-radius:var(--radius);padding:18px 18px 20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(13,31,60,.07)}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:6px}
/* camera / photo */
.cam-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.cam-btn{padding:13px 8px;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:inherit}
.cam-btn:active{transform:scale(.97)}
.cam-primary{background:var(--amber);color:var(--navy)}
.cam-secondary{background:var(--bg);color:var(--muted);border:1.5px solid var(--border)}
.cam-tip{background:var(--surface);border:1.5px dashed var(--border);border-radius:var(--radius);padding:22px 16px;text-align:center;margin-bottom:12px}
.cam-tip .ci{font-size:30px;margin-bottom:8px}
.cam-tip p{font-size:13px;color:var(--muted);line-height:1.5}
.preview{position:relative;border-radius:12px;overflow:hidden;margin-bottom:10px}
.preview img{width:100%;max-height:180px;object-fit:cover;display:block;cursor:pointer}
.unatt-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.unatt-modal{background:var(--bg);border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;padding:0}
.unatt-modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.unatt-modal-title{font-size:15px;font-weight:700;color:var(--navy)}
.unatt-modal-body{overflow-y:auto;padding:12px 14px;flex:1}
.unatt-item{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.unatt-item:last-child{margin-bottom:0}
.unatt-why{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;background:#FEE2E2;color:#B91C1C;margin-top:5px}
.pdf-preview{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:18px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.pdf-icon{font-size:36px;flex-shrink:0}
.pdf-info{flex:1;min-width:0}
.pdf-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.pdf-sub{font-size:12px;color:var(--muted)}
.pdf-btn{padding:7px 14px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;font-family:inherit}
.retake-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer}
.status-ai{background:var(--orange-bg);color:var(--orange);border-radius:10px;padding:11px 14px;font-size:13px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.status-ok{background:var(--green-bg);color:var(--green);border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:12px}
/* form */
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px}
.field input,.field select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:16px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;font-family:inherit;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{border-color:var(--navy)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.chip{padding:6px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;color:var(--muted);background:var(--surface);user-select:none;-webkit-user-select:none}
.chip:active{transform:scale(.96)}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.ac-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ac-card{border:2px solid var(--border);border-radius:var(--radius);padding:16px 10px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;background:var(--surface)}
.ac-card:active{transform:scale(.97)}
.ac-card.on{border-color:var(--navy);background:#EEF4FC}
.ac-ico{font-size:26px;margin-bottom:6px}
.ac-name{font-size:13px;font-weight:600}
.ac-reg{font-size:11px;color:var(--muted);margin-top:2px}
.notes-ta{width:100%;min-height:70px;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;color:var(--text);background:var(--surface);outline:none;font-family:inherit;resize:vertical;transition:border-color .15s}
.notes-ta:focus{border-color:var(--navy)}
.submit-btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:var(--radius);padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;font-family:inherit}
.submit-btn:active{transform:scale(.98)}
.submit-btn:disabled{opacity:.45;pointer-events:none}
/* stats / history */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.stat-card{background:var(--surface);border-radius:12px;padding:12px 11px;box-shadow:0 1px 4px rgba(13,31,60,.06);text-align:center}
.sl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.sv{font-size:14px;font-weight:700;color:var(--navy);margin-top:4px;line-height:1.2;word-break:break-word}
.ss{font-size:10px;color:var(--muted)}
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{white-space:nowrap;padding:7px 14px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);font-size:12px;cursor:pointer;color:var(--muted);flex-shrink:0;font-family:inherit}
.filter-chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.expense-item,.log-item{background:var(--surface);border-radius:var(--radius);padding:13px 14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(13,31,60,.06)}
.expense-item{cursor:pointer}
.expense-item:active{background:#FAFBFD}
.exp-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.exp-desc{font-size:14px;font-weight:600;flex:1;line-height:1.3}
.exp-amt{font-size:15px;font-weight:700;color:var(--navy);white-space:nowrap}
.exp-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:0}
.mc{padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500}
.mc-ac1{background:#E0EAFF;color:#1A4DAA}
.mc-ac2{background:#FFF0E0;color:#AA4A00}
.mc-cat{background:#F2F2F2;color:#444}
.mc-gray{background:#F0F4FA;color:var(--muted)}
.mc-socio{background:#E8F5E9;color:#2E7D32}
.exp-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:9px;padding-top:9px;border-top:1px solid #F2F5FA}
.exp-date{font-size:12px;color:var(--muted)}
.del-btn{background:none;border:none;font-size:19px;cursor:pointer;color:#CCC;padding:2px 6px;line-height:1}
.del-btn:active{color:#E53935}
.export-btn{width:100%;padding:12px;background:var(--bg);color:var(--navy);border:1.5px solid var(--border);border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit}
/* settings */
.sgroup{background:var(--surface);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;box-shadow:0 1px 4px rgba(13,31,60,.06)}
.sg-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);padding:12px 16px 6px}
.sitem{padding:12px 16px;border-bottom:1px solid #F5F7FA}
.sitem:last-child{border-bottom:none}
.sitem label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px}
.sitem input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none}
.sitem input:focus{border-color:var(--navy)}
.hint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}
.save-btn{width:100%;background:var(--amber);color:var(--navy);border:none;border-radius:var(--radius);padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.save-btn:active{transform:scale(.98)}
.mitem{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #F5F7FA;font-size:14px;color:var(--text)}
.mitem:last-child{border-bottom:none}
.mbtn{background:none;border:none;color:#CCC;font-size:19px;cursor:pointer;padding:2px 4px;line-height:1;flex-shrink:0}
.mbtn:active{color:#E53935}
.add-row{display:flex;gap:8px;margin-top:10px}
.add-row input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;min-width:0}
.add-row input:focus{border-color:var(--navy)}
.add-btn{padding:10px 14px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0}
.add-btn:active{transform:scale(.97)}
.mlist-empty{font-size:13px;color:var(--muted);padding:6px 0}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(13,31,60,.55);z-index:900;display:none;align-items:flex-end;justify-content:center}
.modal-sheet{background:var(--bg);width:100%;max-width:480px;max-height:90vh;border-radius:20px 20px 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(22px + env(safe-area-inset-bottom,0));position:relative}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:3px;margin:0 auto 14px}
.modal-close{position:absolute;top:14px;right:16px;background:rgba(13,31,60,.08);border:none;width:30px;height:30px;border-radius:50%;font-size:15px;color:var(--navy);cursor:pointer}
.detail-photo{width:100%;border-radius:12px;margin-bottom:14px;cursor:pointer;display:block}
.no-photo{background:var(--surface);border:1.5px dashed var(--border);border-radius:12px;padding:22px;text-align:center;color:var(--muted);font-size:13px;margin-bottom:14px}
.dt-row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid #E4E9F2;font-size:13px;align-items:baseline}
.dt-row:last-child{border-bottom:none}
.dt-l{color:var(--muted);flex-shrink:0;font-size:12px;min-width:80px}
.dt-v{text-align:right;font-weight:500;word-break:break-word}
/* viewer */
.viewer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:950;display:none;align-items:center;justify-content:center;flex-direction:column;padding:24px}
.viewer-overlay img{max-width:100%;max-height:78vh;border-radius:8px}
.viewer-close{margin-top:18px;padding:10px 22px;background:#fff;border:none;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit}
/* empty */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .ei{font-size:44px;margin-bottom:12px}
.empty h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty p{font-size:13px}
/* charts */
.kpi2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kcard{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.kblue{background:#EEF4FC;border-color:#C8D8F0}
.kblue .kv,.kblue .kl,.kblue .ks{color:#185FA5}
.kl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.kv{font-size:22px;font-weight:700;line-height:1.1;color:var(--navy)}
.ks{font-size:11px;color:var(--muted);margin-top:3px}
.chart-item{margin-bottom:16px}
.chart-item:last-child{margin-bottom:0}
.chart-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;gap:12px}
.chart-lbl{font-size:13px;color:var(--text);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chart-val{font-size:13px;font-weight:700;color:var(--navy);white-space:nowrap;flex-shrink:0}
.chart-track{height:10px;background:var(--bg);border-radius:8px;overflow:hidden}
.chart-fill{height:100%;border-radius:8px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.parc-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:8px}
.parc-chip{padding:9px 4px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);background:var(--surface);user-select:none;-webkit-user-select:none}
.parc-chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.inst-preview{background:var(--bg);border-radius:10px;padding:10px 12px;margin-top:10px}
.inst-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #E8EDF5;font-size:12px;gap:8px}
.inst-row:last-child{border-bottom:none;padding-bottom:0}
.inst-num{color:var(--navy);font-weight:700;flex-shrink:0;min-width:38px}
.inst-date{flex:1;color:var(--text)}
.inst-amt{font-weight:700;color:var(--navy);flex-shrink:0}
.mc-parc{background:#F0E8FF;color:#6C20A8}
.rateio-list{margin-top:8px}
.rateio-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #F2F5FA}
.rateio-row:last-child{border-bottom:none}
.rateio-name{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.rateio-input{width:58px;padding:6px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;text-align:center;font-family:inherit;color:var(--text);outline:none}
.rateio-input:focus{border-color:var(--navy)}
.rateio-pct{font-size:13px;color:var(--muted);font-weight:600}
.rateio-total{font-size:12px;font-weight:700;padding:8px 0 2px;text-align:right;margin-top:4px}
.rateio-total.ok{color:#2E7D32}
.rateio-total.err{color:#C0392B}
.exp-overdue{border-left:3px solid #C0392B!important;background:#FFF8F8!important}
.exp-thismonth{border-left:3px solid var(--amber)!important;background:#FFFDF5!important}
.due-tag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.due-overdue{background:#FDECEA;color:#C0392B}
.due-thismonth{background:#FFF3CD;color:#856404}
.due-future{background:#F0F4FA;color:var(--muted)}
.edit-banner{background:#FFF8E8;border:1.5px solid #F5A623;border-radius:10px;padding:10px 14px;font-size:13px;color:#8A6200;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}

  <button class="viewer-close" onclick="closePhotoViewer()">Fechar</button>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>

/* ===== CONSTANTS ===== */
const DEFAULT_CATS=['Combustivel','Manutencao','Hangar','Taxi / Transfer','Alimentacao','Hospedagem','Estacionamento','Material de bordo','Seguros','Outros'];
const MONTH_AB=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

/* ===== STATE ===== */
let cfg={apiKey:'',myName:'',adminPin:'',pins:{},pilots:[],socios:[],
  categories:DEFAULT_CATS.slice(),
  ac:[{id:'ac1',name:'Aeronave 1',reg:''}],customAirports:{}};
let expenses=[], logbook=[], users=[];
let detailId=null;
let unsubEx=null, unsubLog=null, unsubCfg=null, unsubUsers=null;
let firebaseReady=false, configLoaded=false;

const S={
  tab:'new', newType:'expense',
  img:null, imgB64:null, imgMime:'image/jpeg',
  logImg:null, logImgB64:null, logImgMime:'image/jpeg',
  extracting:false, extracted:false, submitting:false,
  filter:'all', catFilter:'all', logFilter:'all', logSocioFilter:'all', logMonth:'all',
  panelAc:'all', panelSocio:'all', panelView:'expenses', panelLogMonth:'all', panelExpMonth:'all',
  identity:null, identityLoading:true, adminPinMode:false, pinMode:false, pinTarget:null,
  editingExpId:null, editingLogId:null, simulatingSocio:null, unattModal:false,
  form:{description:'',supplier:'',invoiceNo:'',amount:'',date:'',installments:'1',rateioMode:false,rateio:{},category:'',aircraft:'',pilot:'',passenger:'',notes:''},histMonth:'all',
  logForm:{date:'',departureFrom:'',departureTime:'',arrivalTo:'',arrivalTime:'',aircraft:'',pilot:'',passenger:'',notes:''}
};

/* ===== UTILITIES ===== */
function td(){return new Date().toISOString().split('T')[0];}
function fmtD(d){if(!d)return '--';try{const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}catch(e){return d;}}
function fmtR(v){const n=parseFloat(v);return isNaN(n)?'R$ --':n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function sumR(arr){return arr.reduce(function(s,x){return s+(parseFloat(x.amount)||0);},0);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function acLbl(id){const a=cfg.ac.find(function(x){return x.id===id;});return a?(a.reg?a.name+' - '+a.reg:a.name):(id||'--');}
function dataUrlSizeKB(u){const b64=(u||'').split(',')[1]||'';return Math.round(b64.length*0.75/1024);}

/* ===== FIREBASE SETUP ===== */
const FBC={apiKey:"AIzaSyC56qB1n7jndgYfrCZf19tl_HU0wHaaQ7U",authDomain:"aeroexpense.firebaseapp.com",projectId:"aeroexpense",storageBucket:"aeroexpense.firebasestorage.app",messagingSenderId:"739478571294",appId:"1:739478571294:web:10bd3848977e8aa785610f"};
firebase.initializeApp(FBC);
const fbAuth=firebase.auth();
const fdb=firebase.firestore();
try{fdb.enablePersistence({synchronizeTabs:true}).catch(function(){});}catch(e){}

function fsPutExpense(exp){return fdb.collection('expenses').doc(String(exp.id)).set(exp);}
function fsDelExpense(id){return fdb.collection('expenses').doc(String(id)).delete();}
function fsPutLog(entry){return fdb.collection('logbook').doc(String(entry.id)).set(entry);}
function fsDelLog(id){return fdb.collection('logbook').doc(String(id)).delete();}
function saveSharedConfig(){
  return fdb.collection('shared_config').doc('main').set({
    apiKey:cfg.apiKey,pilots:cfg.pilots,socios:cfg.socios,
    categories:cfg.categories,ac:cfg.ac,adminPin:cfg.adminPin||'',pins:cfg.pins||{},customAirports:cfg.customAirports||{}
  },{merge:true});
}

function listenExpenses(){
  if(unsubEx)unsubEx();
  unsubEx=fdb.collection('expenses').onSnapshot(function(snap){
    expenses=snap.docs.map(function(d){return d.data();});
    expenses.sort(function(a,b){return b.id-a.id;});
    if(S.tab!=='new')render();
    if(detailId)renderDetail();
  },function(err){console.error(err);toast('Erro ao sincronizar despesas');});
}
function listenLogbook(){
  if(unsubLog)unsubLog();
  unsubLog=fdb.collection('logbook').onSnapshot(function(snap){
    logbook=snap.docs.map(function(d){return d.data();});
    logbook.sort(function(a,b){return b.id-a.id;});
    buildAirportCache();
    buildAirportList();
    if(S.tab==='logbook')render();
  },function(err){console.error(err);});
}
function listenSharedConfig(){
  if(unsubCfg)unsubCfg();
  unsubCfg=fdb.collection('shared_config').doc('main').onSnapshot(function(doc){
    configLoaded=true;
    if(doc.exists){
      const d=doc.data();
      if(d.apiKey)cfg.apiKey=d.apiKey;
      if(d.pilots)cfg.pilots=d.pilots;
      if(d.socios)cfg.socios=d.socios;
      if(d.categories&&d.categories.length)cfg.categories=d.categories;
      if(d.ac)cfg.ac=d.ac;
      if(d.adminPin!==undefined)cfg.adminPin=d.adminPin;
      if(d.pins)cfg.pins=d.pins;
      if(d.customAirports)cfg.customAirports=d.customAirports;
      saveCfg(); // persiste localmente para próxima abertura
      if(S.tab==='settings'){refreshPilotList();refreshSocioList();refreshCatList();}
      else{render();}
    }else{
      const hasData=!!cfg.apiKey||cfg.pilots.length>0||cfg.socios.length>0;
      if(hasData)saveSharedConfig();
      render();
    }
  },function(err){console.error(err);configLoaded=true;render();});
}
function listenUsers(){
  if(unsubUsers)unsubUsers();
  unsubUsers=fdb.collection('users').onSnapshot(function(snap){
    users=snap.docs.map(function(d){return d.data();});
    if(S.tab==='settings')render();
  });
}
function migrateFromIndexedDB(){
  return new Promise(function(res){
    if(localStorage.getItem('ae_migrated')){res();return;}
    try{
      const req=indexedDB.open('AeroExpenseDB',1);
      req.onsuccess=function(e){
        const db=e.target.result;
        if(!db.objectStoreNames.contains('expenses')){localStorage.setItem('ae_migrated','1');res();return;}
        const tx=db.transaction('expenses','readonly');
        const ga=tx.objectStore('expenses').getAll();
        ga.onsuccess=function(){
          const items=ga.result||[];
          if(!items.length){localStorage.setItem('ae_migrated','1');res();return;}
          const batch=fdb.batch();
          items.forEach(function(item){
            if(item.photo&&dataUrlSizeKB(item.photo)>900)item=Object.assign({},item,{photo:''});
            batch.set(fdb.collection('expenses').doc(String(item.id)),item,{merge:true});
          });
          batch.commit().then(function(){
            toast(items.length+' lancamentos migrados!');
            localStorage.setItem('ae_migrated','1');res();
          }).catch(function(){res();});
        };
        ga.onerror=function(){res();};
      };
      req.onerror=function(){res();};
    }catch(e){res();}
  });
}
function onFirebaseReady(){
  if(firebaseReady)return;
  firebaseReady=true;
  migrateFromIndexedDB().then(function(){
    listenExpenses();
    listenLogbook();
    listenSharedConfig();
    loadIdentity();
  });
}
fbAuth.onAuthStateChanged(function(user){
  if(user){onFirebaseReady();}
  else{fbAuth.signInAnonymously().catch(function(err){console.error(err);toast('Erro ao conectar Firebase');});}
});

/* ===== IMAGE COMPRESSION ===== */
function compressImage(dataUrl,maxDim,quality){
  return new Promise(function(resolve){
    const img=new Image();
    img.onload=function(){
      let w=img.width,h=img.height;
      if(w>=h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
      else if(h>w&&h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',quality));
    };
    img.onerror=function(){resolve(dataUrl);};
    img.src=dataUrl;
  });
}
async function compressForCloud(dataUrl){
  let maxDim=1000,quality=0.65,out=await compressImage(dataUrl,maxDim,quality),tries=0;
  while(dataUrlSizeKB(out)>580&&tries<5){quality=Math.max(0.3,quality-0.12);maxDim=Math.max(600,maxDim-120);out=await compressImage(dataUrl,maxDim,quality);tries++;}
  return out;
}

/* ===== LOCAL STORAGE ===== */
async function loadAll(){
  try{
    const c=localStorage.getItem('ae_cfg');
    if(c){const p=JSON.parse(c);cfg=Object.assign(cfg,p);}
    if(!cfg.pilots)cfg.pilots=[];
    if(!cfg.socios)cfg.socios=[];
    if(!cfg.categories||!cfg.categories.length)cfg.categories=DEFAULT_CATS.slice();
    if(!cfg.adminPin)cfg.adminPin='';
  }catch(e){}
  S.form.date=td();S.logForm.date=td();
  if(cfg.myName){S.form.pilot=cfg.myName;S.logForm.pilot=cfg.myName;}
}
function saveCfg(){try{localStorage.setItem('ae_cfg',JSON.stringify(cfg));}catch(e){}}

/* ===== FILE HANDLING ===== */
function openCam(type){document.getElementById(type==='log'?'file-cam-log':'file-cam').click();}
function openGal(type){document.getElementById(type==='log'?'file-gal-log':'file-gal').click();}
function onFile(inp,type){
  const file=inp.files[0];if(!file)return;
  const isImg=file.type.startsWith('image/');
  const isPDF=file.type==='application/pdf';
  if(!isImg&&!isPDF){toast('Use imagem (JPG/PNG) ou PDF');inp.value='';return;}
  if(isPDF&&file.size>800000){toast('PDF muito grande (max 800KB). Comprima antes de enviar.');inp.value='';return;}
  const rd=new FileReader();
  rd.onload=async function(ev){
    if(isPDF){
      const raw=ev.target.result;
      if(type==='log'){S.logImg=raw;S.logImgMime='application/pdf';S.logImgB64=raw.split(',')[1];}
      else{S.img=raw;S.imgMime='application/pdf';S.imgB64=raw.split(',')[1];S.extracted=false;doExtract();}
    }else{
      const compressed=await compressForCloud(ev.target.result);
      if(type==='log'){S.logImg=compressed;S.logImgMime='image/jpeg';S.logImgB64=compressed.split(',')[1];}
      else{S.img=compressed;S.imgMime='image/jpeg';S.imgB64=compressed.split(',')[1];S.extracted=false;doExtract();}
    }
    render();
  };
  rd.readAsDataURL(file);inp.value='';
}
function clearPhoto(){S.img=null;S.imgB64=null;S.extracted=false;render();}
function clearLogPhoto(){S.logImg=null;S.logImgB64=null;render();}

/* ===== CURRENCY MASK ===== */
function centsToBR(c){
  if(c<0)c=0;const s=String(c).padStart(3,'0');
  let i=s.slice(0,-2).replace(/^0+(?=\d)/,''),dec=s.slice(-2),w='',cnt=0;
  for(let j=i.length-1;j>=0;j--){w=i[j]+w;cnt++;if(cnt%3===0&&j!==0)w='.'+w;}
  return w+','+dec;
}
function formatBR(n){const v=parseFloat(n);return(n===''||n===null||isNaN(v))?'':centsToBR(Math.round(v*100));}
function onAmountInput(el){
  let d=el.value.replace(/\D/g,'').replace(/^0+(?=\d)/,'');
  if(!d){el.value='';S.form.amount='';return;}
  const c=parseInt(d,10);S.form.amount=(c/100).toFixed(2);el.value=centsToBR(c);
  const len=el.value.length;try{el.setSelectionRange(len,len);}catch(e){}
  updateInstPreview();
}
function setAmountValue(numStr){
  const num=parseFloat(numStr);if(isNaN(num))return;
  S.form.amount=num.toFixed(2);const el=document.getElementById('f-amt');if(el)el.value=formatBR(S.form.amount);
}

/* ===== AI EXTRACTION ===== */
async function doExtract(){
  if(!S.imgB64)return;
  const supportedTypes=['image/jpeg','image/png','image/webp','image/gif','image/heic','application/pdf'];
  if(!supportedTypes.includes(S.imgMime))return;
  S.extracting=true;updStatus();
  try{
    const endpoint='https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+cfg.apiKey;
    const cats=cfg.categories.join(', ');
    const prompt='Analise este recibo ou nota fiscal. Responda SOMENTE com JSON valido sem markdown:\n{"description":"descricao resumida","supplier":"nome do fornecedor","amount":"valor com ponto decimal ex 150.90","date":"YYYY-MM-DD ou vazio","invoiceNo":"numero da nota fiscal ou documento se visivel senao vazio","category":"uma destas: '+cats+' (escolha a mais adequada ou vazio)"}';
    const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:S.imgMime,data:S.imgB64}},{text:prompt}]}]})});
    const d=await res.json();
    if(d.error)throw new Error(d.error.message);
    const raw=((d.candidates||[])[0]||{}).content?.parts?.[0]?.text||'';
    const p=JSON.parse(raw.replace(/```[\w]*\n?|\n?```/g,'').trim());
    if(p.description)S.form.description=p.description;
    if(p.supplier)S.form.supplier=p.supplier;
    if(p.date)S.form.date=p.date;
    if(p.invoiceNo)S.form.invoiceNo=p.invoiceNo;
    if(p.category&&cfg.categories.indexOf(p.category)!==-1)S.form.category=p.category;
    S.extracted=true;
    const sv=function(id,v){const el=document.getElementById(id);if(el&&v)el.value=v;};
    sv('f-desc',S.form.description);sv('f-sup',S.form.supplier);sv('f-date',S.form.date);sv('f-invno',S.form.invoiceNo);
    if(p.amount)setAmountValue(p.amount);
    document.querySelectorAll('.cchip').forEach(function(c){c.classList.toggle('on',c.dataset.cat===S.form.category);});
  }catch(err){console.error(err);toast('IA nao disponivel -- preencha manualmente');}
  S.extracting=false;updStatus();
}
function updStatus(){
  const el=document.getElementById('xstatus');if(!el)return;
  el.innerHTML=S.extracting?'<div class="status-ai"><div class="spinner"></div><span>Analisando com IA...</span></div>':
    (S.extracted?'<div class="status-ok">&#10003; Campos preenchidos -- revise antes de confirmar</div>':'');
}

/* ===== EXPENSE CRUD ===== */
async function submitExpense(){
  const desc=(document.getElementById('f-desc')?.value||'').trim();
  if(!desc||!S.form.amount||!S.form.aircraft){toast('Preencha descricao, valor e aeronave');return;}
  S.submitting=true;render();
  const parcelas=Math.max(1,parseInt(S.form.installments)||1);
  const totalAmt=parseFloat(S.form.amount)||0;
  const perInst=parseFloat((totalAmt/parcelas).toFixed(2));
  const firstDue=(document.getElementById('f-date')?.value)||td();
  const parentId=Date.now();
  const pilotVal=(document.getElementById('f-pilot')?.value||'').trim();
  const passVal=(document.getElementById('f-pass')?.value||'').trim();
  const rateioArr=S.form.rateioMode&&Object.keys(S.form.rateio||{}).length
    ?Object.entries(S.form.rateio).map(function(e){return{name:e[0],percent:parseFloat(e[1])};})
    :[];
  const baseExp={
    type:'expense',
    description:desc,
    supplier:(document.getElementById('f-sup')?.value||'').trim(),
    invoiceNo:(document.getElementById('f-invno')?.value||'').trim(),
    totalAmount:S.form.amount,
    installments:parcelas,
    category:S.form.category,aircraft:S.form.aircraft,
    pilot:pilotVal,
    passenger:S.form.rateioMode?'':passVal,
    rateio:rateioArr,
    notes:(document.getElementById('f-notes')?.value||'').trim(),
    photo:S.img||'',
    createdAt:new Date().toISOString(),
    parentId:String(parentId)
  };
  try{
    for(let i=0;i<parcelas;i++){
      const due=addMonths(firstDue,i);
      const exp=Object.assign({},baseExp,{
        id:i===0?parentId:parentId+i+1,
        amount:String(perInst),
        dueDate:due,date:due,
        installmentNo:i+1
      });
      await fsPutExpense(exp);
    }
  }catch(err){console.error(err);toast('Erro ao salvar -- verifique conexao');S.submitting=false;render();return;}
  const lastAc=S.form.aircraft,lastPilot=pilotVal;
  S.form={description:'',supplier:'',invoiceNo:'',amount:'',date:td(),installments:'1',rateioMode:false,rateio:{},category:'',aircraft:lastAc,pilot:lastPilot,passenger:'',notes:''};
  S.img=null;S.imgB64=null;S.extracted=false;S.submitting=false;S.tab='history';
  render();toast(parcelas>1?parcelas+' parcelas lancadas!':'Titulo lancado!');
}
async function deleteExpense(id){

/* ===== TIME MASK ===== */
function onTimeInput(el){
  const pos=el.selectionStart;
  let raw=el.value.replace(/[^0-9:]/g,'');
  // Auto-insert colon after 2 digits if not already there and user is adding
  if(/^\d{2}$/.test(raw)&&(el.dataset.prev||'').length<2)raw=raw+':';
  if(raw.length>5)raw=raw.slice(0,5);
  // Clamp values
  const pts=raw.split(':');
  if(pts[0]&&pts[0].length===2&&parseInt(pts[0])>23)raw='23'+(pts[1]!==undefined?':'+pts[1]:'');
  if(pts[1]&&pts[1].length===2&&parseInt(pts[1])>59)raw=raw.slice(0,3)+'59';
  el.dataset.prev=raw;
  if(el.value!==raw){el.value=raw;try{el.setSelectionRange(pos+(raw.length-el.value.length+1),pos+(raw.length-el.value.length+1));}catch(e){}}
  const fld=el.dataset.fld;if(fld)S.logForm[fld]=raw;
}
function fmtTimeFld(el){
  let raw=el.value.replace(/[^0-9]/g,'').slice(0,4);
  if(!raw){el.value='';const fld=el.dataset.fld;if(fld)S.logForm[fld]='';return;}
  if(raw.length===1)raw='0'+raw;
  if(raw.length===2){el.value=raw;const fld=el.dataset.fld;if(fld)S.logForm[fld]=raw;return;}
  if(raw.length===3)raw='0'+raw;
  let h=raw.slice(0,2),m=raw.slice(2,4);
  if(parseInt(h)>23)h='23';if(parseInt(m)>59)m='59';
  el.value=h+':'+m;const fld=el.dataset.fld;if(fld)S.logForm[fld]=el.value;
}

/* ===== SIMULATE SOCIO VIEW ===== */
async function migrateMonth(fromM,toM,note){
  fromM=(fromM||'').trim();toM=(toM||'').trim();note=(note||'').trim();
  if(!fromM||!toM){toast('Preencha os dois meses');return;}
  if(!/^\d{4}-\d{2}$/.test(fromM)||!/^\d{4}-\d{2}$/.test(toM)){toast('Formato: AAAA-MM (ex: 2026-05)');return;}
  if(!confirm('Mover despesas de '+fromM+' para '+toM+'?\n\nEsta acao nao pode ser desfeita.'))return;
  toast('Buscando despesas...');
  try{
    const snap=await fdb.collection('expenses').get();
    const batch=fdb.batch();
    let count=0;
    snap.forEach(function(doc){
      const x=doc.data();
      const dd=x.dueDate||'';const dt=x.date||'';
      if(dd.startsWith(fromM)||dt.startsWith(fromM)){
        const upd={};
        if(dd.startsWith(fromM))upd.dueDate=toM+dd.slice(7);
        if(dt.startsWith(fromM))upd.date=toM+dt.slice(7);
        if(note)upd.notes=x.notes?(x.notes+'\n'+note):note;
        batch.update(fdb.collection('expenses').doc(doc.id),upd);
        count++;
      }
    });
    if(!count){toast('Nenhuma despesa encontrada em '+fromM);return;}
    await batch.commit();
    // Atualizar array local
    expenses=expenses.map(function(x){
      const dd=x.dueDate||'';const dt=x.date||'';
      if(dd.startsWith(fromM)||dt.startsWith(fromM)){
        const u=Object.assign({},x);
        if(dd.startsWith(fromM))u.dueDate=toM+dd.slice(7);
        if(dt.startsWith(fromM))u.date=toM+dt.slice(7);
        if(note)u.notes=x.notes?(x.notes+'\n'+note):note;
        return u;
      }
      return x;
    });
    toast('\u2705 '+count+' despesas migradas para '+toM+'!');
    render();
  }catch(err){
    console.error(err);
    toast('Erro: '+err.message);
  }
}

/* ===== ROLE FILTERING ===== */
function forRole(list){
  const effectiveRole=S.simulatingSocio?'socio':(S.identity?.role||'');
  const effectiveName=S.simulatingSocio||(S.identity?.name||'');
  if(effectiveRole!=='socio')return list;
  const myName=effectiveName;
  return list.filter(function(x){
    if((x.passenger||'')==='__todos__')return true;
    if((x.passenger||'')===myName)return true;
    if(x.rateio&&x.rateio.some(function(r){return r.name===myName;}))return true;
    return false;
  }).map(function(x){
    // Para despesas com rateio: ajusta o valor para a proporção do sócio
    if(x.rateio&&x.rateio.length){
      const r=x.rateio.find(function(r){return r.name===myName;});
      if(r){
        const portion=parseFloat(((parseFloat(x.amount)||0)*r.percent/100).toFixed(2));
        return Object.assign({},x,{
          amount:String(portion),
          _socioPercent:r.percent,
          _fullAmount:x.amount
        });
      }
    }
    return x;
  });
}

function getFilteredExpenses(){
  let list=forRole(expenses);
  if(S.filter!=='all')list=list.filter(function(x){return x.aircraft===S.filter;});
  if(S.catFilter!=='all')list=list.filter(function(x){return (x.category||'')===S.catFilter;});
  if(S.histMonth!=='all')list=list.filter(function(x){return (x.dueDate||x.date||'').startsWith(S.histMonth);});
  return list.slice().sort(function(a,b){return (a.dueDate||a.date||'').localeCompare(b.dueDate||b.date||'');});
}
function getExportLabel(){
  if(S.histMonth==='all')return 'todas';
  const p=S.histMonth.split('-');return MONTH_AB[parseInt(p[1],10)-1]+'-'+p[0];
}

function buildCSVStr(rows){return '\ufeff'+rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(';');}).join('\r\n');}
function dlCSV(content,fname){
  const blob=new Blob([content],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fname;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('CSV exportado!');
}
function exportExpenseCSV(){

    list.map(function(x){return[fmtD(x.dueDate||x.date),x.description||'',x.supplier||'',x.invoiceNo||'',x.category||'',(parseFloat(x.amount)||0).toFixed(2).replace('.',','),acLbl(x.aircraft),x.pilot||'',x.passenger||'',x.notes||''];}));
  dlCSV(buildCSVStr(rows),'despesas-'+label+'.csv');
}

    doc.autoTable({

          d.cell.styles.fontStyle='bold';

function dataURItoBlob(uri){
  const parts=uri.split(',');const mime=parts[0].split(':')[1].split(';')[0];
  const b=atob(parts[1]);const arr=new Uint8Array(b.length);
  for(let i=0;i<b.length;i++)arr[i]=b.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

const CAT_COLORS=['#2a78d6','#1baf7a','#eda100','#e34948','#4a3aa7','#e87ba4','#eb6834','#888780'];
function socioTotal(name,list){
  return list.reduce(function(s,x){
    const amt=parseFloat(x.amount)||0;
    if((x.passenger||'')===name)return s+amt;
    if((x.passenger||'')==='__todos__')return s+amt/Math.max(1,cfg.socios.length);
    if(x.rateio&&x.rateio.length){const r=x.rateio.find(function(r){return r.name===name;});if(r)return s+amt*(parseFloat(r.percent)||0)/100;}
    return s;
  },0);
}
function unattributedTotal(list){
  const total=sumR(list);
  const attributed=cfg.socios.reduce(function(s,name){return s+socioTotal(name,list);},0);
  return Math.max(0,total-attributed);
}

function getUnattributedList(list){
  return list.filter(function(x){
    const amt=parseFloat(x.amount)||0;
    if(amt<0.01)return false;
    let attributed=0;
    cfg.socios.forEach(function(name){
      const pass=x.passenger||'';
      if(pass===name){attributed+=amt;return;}
      if(pass==='__todos__'){attributed+=amt/Math.max(1,cfg.socios.length);return;}
      if(x.rateio&&x.rateio.length){
        const r=x.rateio.find(function(r){return r.name===name;});
        if(r)attributed+=amt*(parseFloat(r.percent)||0)/100;
      }
    });
    return (amt-attributed)>0.01;
  });
}

function flightMins(x){
  if(!x.departureTime||!x.arrivalTime)return null;
  const dp=x.departureTime.split(':'),ap=x.arrivalTime.split(':');
  const dh=parseInt(dp[0]),dm=parseInt(dp[1]),ah=parseInt(ap[0]),am=parseInt(ap[1]);
  if([dh,dm,ah,am].some(isNaN))return null;
  let m=(ah*60+am)-(dh*60+dm);if(m<0)m+=1440;return m;
}
function fmtMins(m){
  if(m===null||m===undefined||isNaN(m)||m===0)return null;
  const h=Math.floor(m/60),min=m%60;

}

function isOnlyCode(val){
  if(!val)return false;
  const v=val.trim();
  // Codigo puro: ate 6 chars alfanumericos sem espaco nem separador
  return v.length<=6&&/^[A-Za-z0-9]+$/.test(v);
}

function fmtAirport(val){
  if(!val)return val;
  const v=val.trim();
  if(v.includes('/')||(v.includes('-')&&v.length>8))return v;
  const up=v.toUpperCase();
  // 1. Custom airports (user-defined)
  if(cfg.customAirports&&cfg.customAirports[up])return cfg.customAirports[up];
  // 2. Learned from logbook entries
  if(airportCache[up])return airportCache[up];
  // 3. Preset list
  const match=AIRPORTS_PRESET.find(function(a){return a.toUpperCase().includes(up);});
  return match||v;
}
function fmtAirportData(dataObj){
  const out={};
  Object.keys(dataObj).forEach(function(k){
    const fmt=fmtAirport(k);
    out[fmt]=(out[fmt]||0)+dataObj[k];
  });
  return out;
}

function bars(dataObj,color,sortDesc,isCnt){
  let entries=Object.keys(dataObj).map(function(k){return[k,dataObj[k]];});
  if(!entries.length)return '<p class="mlist-empty">Sem dados ainda</p>';
  if(sortDesc!==false)entries=entries.slice().sort(function(a,b){return b[1]-a[1];});
  const max=Math.max(...entries.map(function(e){return e[1];}),1);
  return entries.map(function(e,i){
    const pct=Math.round((e[1]/max)*100);
    const val=isCnt?e[1]+' voo'+(e[1]!==1?'s':''):fmtR(e[1]);
    const alpha=i===0?'ff':i===1?'cc':i===2?'aa':'88';
    return '<div class="chart-item">'
      +'<div class="chart-hdr"><span class="chart-lbl">'+esc(e[0])+'</span><span class="chart-val">'+val+'</span></div>'
      +'<div class="chart-track"><div class="chart-fill" style="width:'+pct+'%;background:'+color+alpha+'"></div></div>'
      +'</div>';
  }).join('');
}
function acBars(list,isCnt){

  const rows=cfg.ac.map(function(a,i){
    const items=list.filter(function(x){return x.aircraft===a.id;});
    const val=isCnt?items.length:items.reduce(function(s,x){return s+(parseFloat(x.amount)||0);},0);
    return{label:acLbl(a.id),val:val,color:AC_PAL[i%AC_PAL.length]};
  });
  const max=Math.max(...rows.map(function(r){return r.val;}),1);
  if(max===0)return '<p class="mlist-empty">Sem dados ainda</p>';
  return rows.map(function(r){
    const pct=Math.round((r.val/max)*100);
    const v=isCnt?r.val+' voo'+(r.val!==1?'s':''):fmtR(r.val);
    return '<div class="chart-item">'
      +'<div class="chart-hdr"><span class="chart-lbl">'+esc(r.label)+'</span><span class="chart-val">'+v+'</span></div>'
      +'<div class="chart-track"><div class="chart-fill" style="width:'+pct+'%;background:'+r.color+'"></div></div>'
      +'</div>';

function rHist(){
  const base=forRole(expenses);
  const isSocio=S.identity?.role==='socio';
  const today=td(),thisMonth=today.slice(0,7);
  const overdueBal=base.filter(function(x){return (x.dueDate||x.date||'').slice(0,7)<thisMonth;});
  const thisMonthBal=base.filter(function(x){return (x.dueDate||x.date||'').slice(0,7)===thisMonth;});
  const canDel=S.identity&&(S.identity.role==='admin'||S.identity.role==='pilot');
  const canAdd=S.identity&&(S.identity.role==='admin'||S.identity.role==='pilot');
  let h='';
  if(isSocio)h+='<div style="background:#EEF4FC;border:1.5px solid #C8D8F0;border-radius:10px;padding:10px 14px;font-size:12px;color:#1A4DAA;margin-bottom:12px;display:flex;align-items:center;gap:8px">&#128274; Voce esta vendo apenas os registros onde aparece como passageiro</div>';
  if(canAdd)h+='<button class="submit-btn" style="margin-bottom:14px" onclick="setTab('+"'new'"+');setNewType('+"'expense'"+')">&plus; Nova despesa / titulo</button>';
  // Stats dinamicos: atualiza conforme mes selecionado
  const statFilt=S.histMonth==='all'?base:base.filter(function(x){return (x.dueDate||x.date||'').startsWith(S.histMonth);});
  if(S.histMonth==='all'){
    h+='<div class="stats-row" style="grid-template-columns:1fr 1fr">'
      +'<div class="stat-card kblue" style="padding:12px 14px"><div class="kl">Total geral</div><div class="kv">'+fmtR(sumR(base))+'</div><div class="ks">'+base.length+' titulo'+(base.length!==1?'s':'')+'</div></div>'
      +'<div class="stat-card" style="padding:12px 14px"><div class="kl">Este mes</div><div class="kv">'+fmtR(sumR(thisMonthBal))+'</div><div class="ks">'+thisMonthBal.length+' titulo'+(thisMonthBal.length!==1?'s':'')+'</div></div>'
      +'</div>';
  }else{
    const mPts=S.histMonth.split('-');const mLbl=MONTH_AB[parseInt(mPts[1],10)-1]+'/'+mPts[0].slice(2);
    h+='<div class="stats-row" style="grid-template-columns:1fr 1fr">'
      +'<div class="stat-card kblue" style="padding:12px 14px"><div class="kl">'+mLbl+'</div><div class="kv">'+fmtR(sumR(statFilt))+'</div><div class="ks">'+statFilt.length+' titulo'+(statFilt.length!==1?'s':'')+'</div></div>'
      +'<div class="stat-card" style="padding:12px 14px"><div class="kl">Total geral</div><div class="kv">'+fmtR(sumR(base))+'</div><div class="ks">'+base.length+' titulos</div></div>'
      +'</div>';
  }
  // Month filter
  const months=getExpMonths(base);
  h+='<div class="filter-bar"><button class="filter-chip'+(S.histMonth==='all'?' on':'')+'" data-m="all" onclick="setHistMonth(this.dataset.m)">Todos</button>';

  months.forEach(function(m){const p=m.split('-');const lbl=MONTH_AB[parseInt(p[1],10)-1]+'/'+p[0].slice(2);h+='<button class="filter-chip'+(S.histMonth===m?' on':'')+'" data-m="'+m+'" onclick="setHistMonth(this.dataset.m)">'+lbl+'</button>';});
  h+='</div>';
  // Aircraft filter
  if(cfg.ac.length>1){h+='<div class="filter-bar"><button class="filter-chip'+(S.filter==='all'?' on':'')+'" data-f="all" onclick="setFilter(this.dataset.f)">Todas aeronaves</button>';
  cfg.ac.forEach(function(a){h+='<button class="filter-chip'+(S.filter===a.id?' on':'')+'" data-f="'+a.id+'" onclick="setFilter(this.dataset.f)">'+esc(a.name)+'</button>';});
  h+='</div>';}
  // Apply filters + sort by dueDate
  let filt=base.slice().sort(function(a,b){return ((a.dueDate||a.date||'')).localeCompare(b.dueDate||b.date||'');});
  if(S.histMonth==='overdue')filt=filt.filter(function(x){return (x.dueDate||x.date||'').slice(0,7)<thisMonth;});
  else if(S.histMonth!=='all')filt=filt.filter(function(x){return (x.dueDate||x.date||'').startsWith(S.histMonth);});
  if(S.filter!=='all')filt=filt.filter(function(x){return x.aircraft===S.filter;});
  if(!filt.length){h+='<div class="empty"><div class="ei">&#128193;</div><h3>Nenhum titulo</h3><p>Adicione despesas na aba Novo</p></div>';}
  else{
    filt.forEach(function(x){
      const due=x.dueDate||x.date||'';
      const statusCls='';
      const dueTag=due?'<span style="font-size:11px;color:var(--muted)">'+fmtD(due)+'</span>':'';
      let meta='<span class="mc mc-'+(x.aircraft==='ac1'?'ac1':'ac2')+'">'+esc(acLbl(x.aircraft))+'</span>';
      if(x.installments>1)meta+='<span class="mc mc-parc">Parcela '+x.installmentNo+'/'+x.installments+'</span>';
      if(x.category)meta+='<span class="mc mc-cat">'+esc(x.category)+'</span>';
      if(x.invoiceNo)meta+='<span class="mc mc-gray">&#128196; '+esc(x.invoiceNo)+'</span>';
      if(x.photo)meta+='<span class="mc mc-gray">&#128247;</span>';
      if(x.pilot)meta+='<span class="mc mc-gray">&#128100; '+esc(x.pilot)+'</span>';
      if(x.rateio&&x.rateio.length)meta+='<span class="mc mc-parc">&#9878; '+(x._socioPercent?x._socioPercent+'%':'Rateio')+'</span>';
      else if(x.passenger==='__todos__')meta+='<span class="mc mc-socio">&#11088; Condomínio</span>';
      else if(x.passenger)meta+='<span class="mc mc-socio">&#11088; '+esc(x.passenger)+'</span>';
      h+='<div class="expense-item'+statusCls+'" data-id="'+x.id+'" onclick="openDetail(this.dataset.id)">'
        +'<div class="exp-top"><div class="exp-desc">'+esc(x.description)+'</div><div style="text-align:right">'
        +'<div class="exp-amt">'+fmtR(x.amount)+'</div>'
        +(x.installments>1?'<div style="font-size:10px;color:var(--muted)">de '+fmtR(x.totalAmount)+'</div>':'')
        +'</div></div>'
        +'<div class="exp-meta">'+meta+'</div>'
        +'<div class="exp-bottom">'+dueTag
        +'<div style="display:flex;gap:4px">'+(canDel?'<button class="edit-btn" data-id="'+x.id+'" onclick="event.stopPropagation();editExpense(this.dataset.id)">&#9999;&#65039;</button>':'')+(canDel?'<button class="del-btn" data-id="'+x.id+'" onclick="event.stopPropagation();deleteExpense(this.dataset.id)">&#128465;</button>':'')+'</div>'
        +'</div></div>';
    });
  }
  if(base.length){
    if(isSocio||(S.simulatingSocio)){
      const eName=S.simulatingSocio||(S.identity?.name||'');
      h+='<div style="display:flex;gap:8px;margin-bottom:8px">'
        +'<button class="export-btn" style="flex:1;background:#0D1F3C;color:#fff;border:none" data-name="'+esc(eName)+'" data-m="all" onclick="exportSocioStatement(this.dataset.name,this.dataset.m)">&#128202; Excel completo</button>'
        +'<button class="export-btn" style="flex:1;background:#C0392B;color:#fff;border:none" data-name="'+esc(eName)+'" data-m="all" onclick="exportSocioStatementPDF(this.dataset.name,this.dataset.m)">&#128196; PDF completo</button>'
        +'</div>';
    }
    h+='<button class="export-btn" onclick="exportExpenseCSV()">&#128228; CSV rapido</button>';
    h+='<button class="export-btn" style="background:var(--navy);color:#fff;border:none;margin-top:8px" onclick="exportExpensePackage()">&#128230; Pacote Excel + comprovantes</button>';
  }
  return h;
}

function rLog(){
  const base=forRole(logbook);
  const isSocio=S.identity?.role==='socio';
  const isSocioView=S.identity?.role==='socio'||!!S.simulatingSocio;

  let filt=base;
  if(S.logFilter!=='all')filt=filt.filter(function(x){return x.aircraft===S.logFilter;});
  if(S.logMonth!=='all')filt=filt.filter(function(x){return (x.date||'').startsWith(S.logMonth);});
  if(!isSocio&&S.logSocioFilter!=='all'){if(S.logSocioFilter==='__todos__')filt=filt.filter(function(x){return (x.passenger||'')==='__todos__';});else filt=filt.filter(function(x){return (x.passenger||'')===S.logSocioFilter;});}
  const canDel=canAdd;
  let h=isSocio?'<div style="background:#EEF4FC;border:1.5px solid #C8D8F0;border-radius:10px;padding:10px 14px;font-size:12px;color:#1A4DAA;margin-bottom:12px;display:flex;align-items:center;gap:8px">&#128274; Voce esta vendo apenas os registros onde aparece como passageiro</div>':'';
  if(canAdd)h+='<button class="submit-btn" style="margin-bottom:14px" onclick="setTab('+"'new'"+');setNewType('+"'log'"+')">&plus; Novo registro de voo</button>';

  if(cfg.ac.length>1)cfg.ac.forEach(function(a){const ax=base.filter(function(x){return x.aircraft===a.id;});h+='<div class="stat-card"><div class="sl">'+esc(a.name)+'</div><div class="sv">'+ax.length+'</div><div class="ss">voos</div></div>';});
  h+='</div>';
  if(cfg.ac.length>1){h+='<div class="filter-bar"><button class="filter-chip'+(S.logFilter==='all'?' on':'')+'" data-f="all" onclick="setLogFilter(this.dataset.f)">Todas aeronaves</button>';
  cfg.ac.forEach(function(a){h+='<button class="filter-chip'+(S.logFilter===a.id?' on':'')+'" data-f="'+a.id+'" onclick="setLogFilter(this.dataset.f)">'+esc(a.name)+'</button>';});
  h+='</div>';}
  if(!isSocio&&cfg.socios.length){h+='<div class="filter-bar"><button class="filter-chip'+(S.logSocioFilter==='all'?' on':'')+'" data-s="all" onclick="setLogSocioFilter(this.dataset.s)">Todos os voos</button><button class="filter-chip'+(S.logSocioFilter==='__todos__'?' on':'')+'" data-s="__todos__" onclick="setLogSocioFilter(this.dataset.s)">&#11088; Condomínio</button>';cfg.socios.forEach(function(s){h+='<button class="filter-chip'+(S.logSocioFilter===s?' on':'')+'" data-s="'+esc(s)+'" onclick="setLogSocioFilter(this.dataset.s)">'+esc(s)+'</button>';});h+='</div>';}
  // Chips de mes
  const logMonths=[...new Set(base.map(function(x){return (x.date||'').slice(0,7);}).filter(Boolean))].sort().reverse();
  if(logMonths.length>1){
    h+='<div class="filter-bar"><button class="filter-chip'+(S.logMonth==='all'?' on':'')+'" data-m="all" onclick="setLogMonth(this.dataset.m)">Todos os meses</button>';
    logMonths.forEach(function(m){const p=m.split('-');const lbl=MONTH_AB[parseInt(p[1],10)-1]+'/'+p[0].slice(2);h+='<button class="filter-chip'+(S.logMonth===m?' on':'')+'" data-m="'+m+'" onclick="setLogMonth(this.dataset.m)">'+lbl+'</button>';});
    h+='</div>';
  }
  if(!filt.length){h+='<div class="empty"><div class="ei">&#9992;&#65039;</div><h3>Nenhum registro</h3><p>Adicione voos na aba Novo &gt; Diario de Bordo</p></div>';}
  else{
    filt.forEach(function(x){
      h+='<div class="log-item">'
        +'<div class="exp-top"><div class="exp-desc">'+esc(fmtAirport(x.departureFrom))+' &rarr; '+esc(fmtAirport(x.arrivalTo))+'</div><span style="font-size:11px;color:var(--muted)">'+fmtD(x.date)+'</span></div>'
        +'<div class="exp-meta"><span class="mc mc-'+(x.aircraft==='ac1'?'ac1':'ac2')+'">'+esc(acLbl(x.aircraft))+'</span>'
        +(x.departureTime||x.arrivalTime?'<span class="mc mc-gray">'+(x.departureTime?esc(x.departureTime):'?')+(x.departureTime&&x.arrivalTime?' &rarr; ':x.arrivalTime?' &rarr; ':'')+(x.arrivalTime?esc(x.arrivalTime):'')+'</span>':'')
        +(x.pilot?'<span class="mc mc-gray">&#128100; '+esc(x.pilot)+'</span>':'')
        +(x.passenger==='__todos__'?'<span class="mc mc-socio">&#11088; Condomínio</span>':(x.passenger?'<span class="mc mc-socio">&#11088; '+esc(x.passenger)+'</span>':''))
        +(x.photo?'<span class="mc mc-gray">&#128247;</span>':'')
        +'</div>'
        +(x.notes?'<div style="font-size:12px;color:var(--muted);margin-top:7px;line-height:1.4">'+esc(x.notes)+'</div>':'')
        +'<div class="exp-bottom">'
        +(x.photo?'<button class="filter-chip" style="font-size:11px;padding:4px 10px;margin:0" data-src="'+esc(x.photo)+'" onclick="openPhotoViewer(this.dataset.src)">Ver documento</button>':'<span></span>')
        +'<div style="display:flex;gap:4px">'+(canDel?'<button class="edit-btn" data-id="'+x.id+'" onclick="editLog(this.dataset.id)">&#9999;&#65039;</button>':'')+(canDel?'<button class="del-btn" data-id="'+x.id+'" onclick="deleteLog(this.dataset.id)">&#128465;</button>':'')+'</div>'
        +'</div></div>';
    });
  }
  if(base.length){
    // PDF sempre disponivel (socio e admin)
    h+='<button class="export-btn" style="background:#C0392B;color:#fff;border:none;margin-bottom:8px" onclick="exportLogPDF()">&#128196; Exportar Diario em PDF</button>';
    if(canAdd){
      h+='<div style="display:flex;gap:8px">'
        +'<button class="export-btn" style="flex:1" onclick="exportLogCSV()">&#128228; CSV</button>'
        +'<button class="export-btn" style="flex:1;background:var(--navy);color:#fff;border:none" onclick="exportLogPackage()">&#128230; Pacote ZIP</button>'
        +'</div>';
    }
  }
  return h;
}

function rPanelExp(){
  let base=forRole(expenses);
  if(!base.length)return '<div class="empty"><div class="ei">&#128202;</div><h3>Sem despesas</h3><p>Adicione lancamentos para ver os graficos</p></div>';
  const isSocio=S.identity?.role==='socio';
  const today=td(),thisMonth=today.slice(0,7);
  let h='';
  // Filtros aeronave e socio
  if(cfg.ac.length>1){h+='<div class="filter-bar"><button class="filter-chip'+(S.panelAc==='all'?' on':'')+'" data-f="all" onclick="setPanelAc(this.dataset.f)">Todas aeronaves</button>';cfg.ac.forEach(function(a){h+='<button class="filter-chip'+(S.panelAc===a.id?' on':'')+'" data-f="'+a.id+'" onclick="setPanelAc(this.dataset.f)">'+esc(a.name)+'</button>';});h+='</div>';}
  if(!isSocio&&cfg.socios.length){h+='<div class="filter-bar"><button class="filter-chip'+(S.panelSocio==='all'?' on':'')+'" data-s="all" onclick="setPanelSocio(this.dataset.s)">Condomínio</button>';cfg.socios.forEach(function(s){h+='<button class="filter-chip'+(S.panelSocio===s?' on':'')+'" data-s="'+esc(s)+'" onclick="setPanelSocio(this.dataset.s)">'+esc(s)+'</button>';});h+='</div>';}
  let filtered=base;
  if(S.panelAc!=='all')filtered=filtered.filter(function(x){return x.aircraft===S.panelAc;});
  if(!isSocio&&S.panelSocio!=='all'){
    const ps=S.panelSocio;
    // Incluir despesas diretas, rateio e condominio
    filtered=filtered.filter(function(x){
      if((x.passenger||'')===ps)return true;
      if((x.passenger||'')==='__todos__')return true;
      if(x.rateio&&x.rateio.some(function(r){return r.name===ps;}))return true;
      return false;
    });
    // Ajustar valores para a proporção do sócio
    filtered=filtered.map(function(x){
      if(x.rateio&&x.rateio.length){
        const r=x.rateio.find(function(r){return r.name===ps;});
        if(r){const p=parseFloat(x.amount)*r.percent/100;return Object.assign({},x,{amount:String(p),_socioPercent:r.percent,_fullAmount:x.amount});}
      }
      if((x.passenger||'')==='__todos__'){
        const n=Math.max(1,cfg.socios.length);
        const p=parseFloat(x.amount)/n;
        return Object.assign({},x,{amount:String(p),_socioPercent:Math.round(100/n),_fullAmount:x.amount});
      }
      return x;
    });
  }
  // Navegacao por mes
  const months=getExpMonths(filtered);
  h+='<div class="filter-bar"><button class="filter-chip'+(S.panelExpMonth==='all'?' on':'')+'" data-m="all" onclick="setPanelExpMonth(this.dataset.m)">Visao geral</button>';
  months.forEach(function(m){const p=m.split('-');const lbl=MONTH_AB[parseInt(p[1],10)-1]+'/'+p[0].slice(2);h+='<button class="filter-chip'+(S.panelExpMonth===m?' on':'')+'" data-m="'+m+'" onclick="setPanelExpMonth(this.dataset.m)">'+lbl+'</button>';});
  h+='</div>';
  if(S.panelExpMonth==='all'){
    // Visao geral: KPI + graficos
    const thisMoList=filtered.filter(function(x){return (x.dueDate||x.date||'').slice(0,7)===thisMonth;});
    h+='<div class="kpi2">';
    h+='<div class="kcard kblue"><div class="kl">Total geral</div><div class="kv">'+fmtR(sumR(filtered))+'</div><div class="ks">'+filtered.length+' titulo'+(filtered.length!==1?'s':'')+'</div></div>';
    h+='<div class="kcard"><div class="kl">Este mes</div><div class="kv">'+fmtR(sumR(thisMoList))+'</div><div class="ks">'+thisMoList.length+' titulo'+(thisMoList.length!==1?'s':'')+'</div></div>';
    h+='</div>';
    // Reconciliacao (so para admin, nunca para socio ou simulacao)
    if(!isSocio&&!S.simulatingSocio&&cfg.socios.length){
      const unatt=unattributedTotal(filtered);
      h+='<div class="card"><div class="card-title">&#9878; Reconciliacao por socio</div>';
      cfg.socios.forEach(function(s){
        const st=socioTotal(s,filtered);
        const pct=sumR(filtered)>0?Math.round(st/sumR(filtered)*100):0;
        h+='<div class="chart-item"><div class="chart-hdr"><span class="chart-lbl">'+esc(s)+'</span><span class="chart-val">'+fmtR(st)+'</span></div>'
          +'<div class="chart-track"><div class="chart-fill" style="width:'+pct+'%;background:#2a78d6"></div></div></div>';
      });
      if(unatt>0.01){
        const upct=sumR(filtered)>0?Math.round(unatt/sumR(filtered)*100):0;
        h+='<div class="chart-item" onclick="openUnattModal()" style="cursor:pointer" title="Toque para ver os lancamentos"><div class="chart-hdr"><span class="chart-lbl" style="color:var(--red)">&#9888; Nao atribuido</span><span style="display:flex;align-items:center;gap:6px"><span class="chart-val" style="color:var(--red)">'+fmtR(unatt)+'</span><span style="font-size:11px;color:var(--red);font-weight:600">Ver &rsaquo;</span></span></div>'
          +'<div class="chart-track"><div class="chart-fill" style="width:'+upct+'%;background:var(--red)"></div></div></div>';
      }else{
        h+='<div style="font-size:12px;color:#2E7D32;margin-top:8px;text-align:center">&#10003; 100% atribuido aos socios</div>';
      }
      h+='</div>';
    }
    h+='<div class="card"><div class="card-title">&#128197; Fluxo por mes</div>'+bars(groupByDueMonth(filtered),'#2a78d6',false)+'</div>';
    h+='<div class="card"><div class="card-title">&#127991;&#65039; Por categoria</div>'+bars(groupByField(filtered,'category'),'#1baf7a')+'</div>';
    if(!isSocio&&cfg.socios.length)h+='<div class="card"><div class="card-title">&#11088; Por socio</div>'+bars(groupBySocioRateio(filtered),'#eda100')+'</div>';
    if(!isSocio&&cfg.pilots.length)h+='<div class="card"><div class="card-title">&#128100; Por piloto</div>'+bars(groupByField(filtered,'pilot'),'#888780')+'</div>';
  }else{
    // Mes especifico: KPI + lista
    const mParts=S.panelExpMonth.split('-');
    const mNum=parseInt(mParts[1],10),mYear=parseInt(mParts[0],10);
    const mLabel=MONTH_AB[mNum-1]+' de '+mYear;
    const nextNum=mNum===12?1:mNum+1,nextYear=mNum===12?mYear+1:mYear;
    const nextKey=nextYear+'-'+String(nextNum).padStart(2,'0');
    const nextLabel=MONTH_AB[nextNum-1]+'/'+String(nextYear).slice(2);
    const mList=filtered.filter(function(x){return (x.dueDate||x.date||'').startsWith(S.panelExpMonth);});
    const nextList=filtered.filter(function(x){return (x.dueDate||x.date||'').startsWith(nextKey);});
    h+='<div class="kpi2">';
    h+='<div class="kcard kblue"><div class="kl">'+mLabel+'</div><div class="kv">'+fmtR(sumR(mList))+'</div><div class="ks">'+mList.length+' titulo'+(mList.length!==1?'s':'')+'</div></div>';
    h+='<div class="kcard"><div class="kl">'+nextLabel+'</div><div class="kv">'+fmtR(sumR(nextList))+'</div><div class="ks">proximo mes</div></div>';
    h+='</div>';
    // Botao exportar extrato (para socios e simulacao)
    const exportName=S.simulatingSocio||(isSocio?S.identity?.name:'');
    if(exportName){
      const elbl=esc(MONTH_AB[mNum-1]+' '+mYear);
      h+='<div style="display:flex;gap:8px;margin-bottom:10px">'
        +'<button class="export-btn" style="flex:1;background:#0D1F3C;color:#fff;border:none" data-name="'+esc(exportName)+'" data-m="'+S.panelExpMonth+'" onclick="exportSocioStatement(this.dataset.name,this.dataset.m)">&#128202; Excel</button>'
        +'<button class="export-btn" style="flex:1;background:#C0392B;color:#fff;border:none" data-name="'+esc(exportName)+'" data-m="'+S.panelExpMonth+'" onclick="exportSocioStatementPDF(this.dataset.name,this.dataset.m)">&#128196; PDF</button>'
        +'</div>';
    }
    if(!mList.length){
      h+='<div class="empty"><div class="ei">&#128193;</div><h3>Sem titulos em '+MONTH_AB[mNum-1]+'</h3></div>';
    }else{
      const sorted=mList.slice().sort(function(a,b){return (a.dueDate||a.date||'').localeCompare(b.dueDate||b.date||'');});
      sorted.forEach(function(x){
        const clr=catColor(x.category);
        const inst=x.installments>1?'Parcela '+x.installmentNo+'/'+x.installments:'A vista';
        let meta='<span class="mc mc-'+(x.aircraft==='ac1'?'ac1':'ac2')+'">'+esc(acLbl(x.aircraft))+'</span>';
        if(x.category)meta+='<span class="mc mc-cat">'+esc(x.category)+'</span>';
        if(x.pilot)meta+='<span class="mc mc-gray">&#128100; '+esc(x.pilot)+'</span>';
        if(x.rateio&&x.rateio.length)meta+='<span class="mc mc-parc">&#9878; '+(x._socioPercent?x._socioPercent+'%':'Rateio')+'</span>';
        else if(x.passenger==='__todos__')meta+='<span class="mc mc-socio">&#11088; Todos</span>';
        else if(x.passenger)meta+='<span class="mc mc-socio">&#11088; '+esc(x.passenger)+'</span>';
        h+='<div class="expense-item" data-id="'+x.id+'" onclick="openDetail(this.dataset.id)">'
          +'<div class="exp-top">'
          +'<div style="display:flex;align-items:center;gap:9px;flex:1;min-width:0">'
          +'<div style="width:10px;height:10px;border-radius:50%;flex-shrink:0;background:'+clr+'"></div>'
          +'<div class="exp-desc">'+esc(x.description)+'</div>'
          +'</div>'
          +'<div style="text-align:right;flex-shrink:0">'
          +'<div class="exp-amt">'+fmtR(x.amount)+'</div>'
          +(x.installments>1?'<div style="font-size:10px;color:var(--muted)">'+inst+'</div>':'')
          +'</div></div>'
          +'<div class="exp-meta" style="margin-top:6px">'+meta+'</div>'
          +'<div style="font-size:11px;color:var(--muted);margin-top:5px">'+fmtD(x.dueDate||x.date)+'</div>'
          +'</div>';
      });
    }
  }
  return h;
}

function rPanelLog(){
  const base=forRole(logbook);
  if(!base.length)return '<div class="empty"><div class="ei">&#9992;&#65039;</div><h3>Sem voos registrados</h3><p>Adicione registros no Diario de Bordo</p></div>';
  const isSocio=S.identity?.role==='socio';

  // Consolidated stats
  const allCities=new Set();
  base.forEach(function(x){
    if(x.arrivalTo)allCities.add(x.arrivalTo.trim());
    if(x.departureFrom)allCities.add(x.departureFrom.trim());
  });
  const totalMin=sumMins(base);
  const totalHStr=fmtMins(totalMin);

  let h='<div class="stats-row">'
    +'<div class="stat-card"><div class="sl">Total de voos</div><div class="sv">'+base.length+'</div><div class="ss">registrados</div></div>'
    +'<div class="stat-card"><div class="sl">Cidades</div><div class="sv">'+allCities.size+'</div><div class="ss">visitadas</div></div>'
    +(totalHStr
      ?'<div class="stat-card"><div class="sl">Horas voadas</div><div class="sv">'+totalHStr+'</div><div class="ss">registradas</div></div>'
      :'<div class="stat-card"><div class="sl">Destinos</div><div class="sv">'+new Set(base.map(function(x){return x.arrivalTo;})).size+'</div><div class="ss">distintos</div></div>')
    +'</div>';

  // Month selector
  const months=getLogMonths(base);
  h+='<div class="filter-bar"><button class="filter-chip'+(S.panelLogMonth==='all'?' on':'')+'" data-m="all" onclick="setPanelLogMonth(this.dataset.m)">Visao geral</button>';
  months.forEach(function(m){
    const p=m.split('-');
    const lbl=MONTH_AB[parseInt(p[1],10)-1]+'/'+p[0].slice(2);
    h+='<button class="filter-chip'+(S.panelLogMonth===m?' on':'')+'" data-m="'+m+'" onclick="setPanelLogMonth(this.dataset.m)">'+lbl+'</button>';
  });
  h+='</div>';

  if(S.panelLogMonth==='all'){
    // ── Visao geral: graficos ──
    if(cfg.ac.length>1)h+='<div class="card"><div class="card-title">&#9992;&#65039; Voos por aeronave</div>'+acBars(base,true)+'</div>';
    h+='<div class="card"><div class="card-title">&#128197; Voos por mes</div>'+bars(groupByMonthCnt(base),'#F5A623',false,true)+'</div>';
    h+='<div class="card"><div class="card-title">&#128100; Voos por piloto</div>'+bars(groupByFieldCnt(base,'pilot'),'#0D1F3C',true,true)+'</div>';
    if(!isSocio&&cfg.socios.length)h+='<div class="card"><div class="card-title">&#11088; Voos por socio</div>'+bars(groupByFieldCnt(base,'passenger'),'#2E7D32',true,true)+'</div>';
    h+='<div class="card"><div class="card-title">&#127939;&#65039; Destinos mais frequentes</div>'+bars(fmtAirportData(groupByFieldCnt(base,'arrivalTo')),'#C0392B',true,true)+'</div>';

  } else {
    // ── Mes especifico: lista detalhada ──
    const mList=base.filter(function(x){return x.date&&x.date.startsWith(S.panelLogMonth);});
    const mParts=S.panelLogMonth.split('-');
    const mLabel=MONTH_AB[parseInt(mParts[1],10)-1]+' de 20'+mParts[0].slice(2);

    // Stats do mes
    const mMins=sumMins(mList);
    const mHStr=fmtMins(mMins);
    const mDests=new Set(mList.map(function(x){return x.arrivalTo;}).filter(Boolean));

    h+='<div class="month-summary">'
      +'<div class="ms-card"><div class="ms-val">'+mList.length+'</div><div class="ms-lbl">Voos</div></div>'
      +(mHStr?'<div class="ms-card"><div class="ms-val">'+mHStr+'</div><div class="ms-lbl">Horas</div></div>':'<div class="ms-card"><div class="ms-val">--</div><div class="ms-lbl">Horas</div></div>')
      +'<div class="ms-card"><div class="ms-val">'+mDests.size+'</div><div class="ms-lbl">Destinos</div></div>'
      +'</div>';

    if(!mList.length){
      h+='<div class="empty"><div class="ei">&#9992;&#65039;</div><h3>Sem voos em '+mLabel+'</h3></div>';
    }else{
      // Lista de voos
      h+='<div class="card"><div class="card-title">&#128197; Voos em '+mLabel+'</div>';
      mList.forEach(function(x){
        const dur=fmtMins(flightMins(x));
        h+='<div class="flight-card">'
          +'<div class="fc-route">'+esc(fmtAirport(x.departureFrom))+' &rarr; '+esc(fmtAirport(x.arrivalTo))+'</div>'
          +'<div class="fc-date">'+fmtD(x.date)+'</div>'
          +'<div class="exp-meta">'
          +'<span class="mc mc-'+(x.aircraft==='ac1'?'ac1':'ac2')+'">'+esc(acLbl(x.aircraft))+'</span>'
          +(x.pilot?'<span class="mc mc-gray">&#128100; '+esc(x.pilot)+'</span>':'')
          +(x.passenger?'<span class="mc mc-socio">&#11088; '+esc(x.passenger)+'</span>':'')
          +'</div>'
          +(x.departureTime||x.arrivalTime||dur
            ?'<div class="fc-time">'
              +(x.departureTime?'&#9652; '+esc(x.departureTime):'')
              +(x.departureTime&&x.arrivalTime?' &nbsp;&rarr;&nbsp; ':'')
              +(x.arrivalTime?'&#9660; '+esc(x.arrivalTime):'')
              +(dur?'&nbsp;<span class="fc-dur">'+dur+'</span>':'')
              +'</div>'
            :'')
          +(x.notes?'<div style="font-size:12px;color:var(--muted);margin-top:5px;font-style:italic">'+esc(x.notes)+'</div>':'')
          +(x.photo?'<div style="margin-top:8px"><button class="filter-chip" style="font-size:11px;padding:4px 10px;margin:0" data-src="'+esc(x.photo)+'" onclick="openPhotoViewer(this.dataset.src)">Ver documento</button></div>':'')
          +'</div>';
      });
      h+='</div>';

      // Rotas do mes
      if(mDests.size>1){
        h+='<div class="card"><div class="card-title">&#127939;&#65039; Destinos em '+MONTH_AB[parseInt(mParts[1],10)-1]+'</div>'+bars(fmtAirportData(groupByFieldCnt(mList,'arrivalTo')),'#C0392B',true,true)+'</div>';
      }
      // Aeronaves do mes (so se tiver dados em ambas)
      const acUsed=new Set(mList.map(function(x){return x.aircraft;}));
      if(acUsed.size>1){
        h+='<div class="card"><div class="card-title">&#9992;&#65039; Aeronaves no mes</div>'+acBars(mList,true)+'</div>';
      }
      // Pilotos do mes
      const pilotCnt=groupByFieldCnt(mList,'pilot');
      if(Object.keys(pilotCnt).length>1){
        h+='<div class="card"><div class="card-title">&#128100; Pilotos no mes</div>'+bars(pilotCnt,'#0D1F3C',true,true)+'</div>';
      }
    }
  }
  return h;
}
